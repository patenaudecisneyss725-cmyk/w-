<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台登录 - 发卡商城管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-title {
      text-align: center;
      color: #1a1a2e;
      font-size: 24px;
      margin-bottom: 10px;
    }
    .login-subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label { 
      display: block; 
      color: #333; 
      margin-bottom: 8px;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #e94560;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #e94560 0%, #d63850 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn-login:hover { transform: translateY(-2px); }
    .btn-login:active { transform: scale(0.98); }
    
    .error-msg {
      color: #e74c3c;
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      display: none;
    }
    .error-msg.show { display: block; }
    
    .back-home {
      text-align: center;
      margin-top: 20px;
    }
    .back-home a {
      color: #666;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1 class="login-title">🔧 后台管理</h1>
    <p class="login-subtitle">请输入管理员账号密码</p>
    
    <div class="form-group">
      <label>账号</label>
      <input type="text" id="username" placeholder="请输入账号">
    </div>
    
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码">
    </div>
    
    <button class="btn-login" onclick="doLogin()">登录</button>
    
    <p class="error-msg" id="errorMsg"></p>
    
    <div class="back-home">
      <a href="../index.html">← 返回商城首页</a>
    </div>
  </div>

  <script>
    // 检查是否已登录
    const adminToken = localStorage.getItem('admin_token');
    if (adminToken) {
      location.href = 'orders.html';
    }
    
    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        showError('请输入账号和密码');
        return;
      }
      
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('admin_token', data.token);
          location.href = 'orders.html';
        } else {
          showError(data.error || '账号或密码错误');
        }
      } catch (e) {
        showError('网络错误，请稍后重试');
      }
    }
    
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }
    
    // 回车登录
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
