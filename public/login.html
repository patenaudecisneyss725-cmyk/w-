<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>辣妹国内商城 - 订单查询</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error-msg {
      color: #e74c3c;
      text-align: center;
      margin-top: 10px;
      display: none;
    }
    .orders-section {
      display: none;
    }
    .orders-section.active {
      display: block;
    }
    .order-card {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 15px;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    .order-id {
      font-weight: 600;
      color: #333;
    }
    .status {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .status.pending { background: #ffeaa7; color: #d63031; }
    .status.paid { background: #74b9ff; color: #0984e3; }
    .status.shipped { background: #55efc4; color: #00b894; }
    .status.delivered { background: #a29bfe; color: #6c5ce7; }
    .order-info p {
      margin: 8px 0;
      color: #555;
    }
    .order-info strong {
      color: #333;
    }
    .shipping-info {
      background: #e8f5e9;
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
    }
    .shipping-info h4 {
      color: #2e7d32;
      margin-bottom: 10px;
    }
    .back-btn {
      background: #95a5a6;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 辣妹国内商城</h1>
    
    <!-- 登录表单 -->
    <div id="loginSection">
      <div class="form-group">
        <label>手机号码</label>
        <input type="tel" id="phone" placeholder="请输入下单时填写的手机号码" pattern="[0-9]{11}">
      </div>
      <button onclick="login()">查询订单</button>
      <p class="error-msg" id="errorMsg"></p>
    </div>
    
    <!-- 订单列表 -->
    <div class="orders-section" id="ordersSection">
      <h2 style="margin-bottom: 20px;">📦 我的订单</h2>
      <div id="ordersList"></div>
      <button class="back-btn" onclick="logout()">🔙 返回</button>
    </div>
  </div>

  <script>
    let userPhone = '';

    async function login() {
      const phone = document.getElementById('phone').value.trim();
      
      if (!phone || phone.length !== 11) {
        showError('请输入正确的11位手机号');
        return;
      }
      
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        
        const data = await res.json();
        
        if (data.success) {
          userPhone = phone;
          showOrders(data.orders);
        } else {
          showError(data.error || '查询失败');
        }
      } catch (e) {
        showError('网络错误，请重试');
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function showOrders(orders) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('ordersSection').classList.add('active');
      
      const list = document.getElementById('ordersList');
      
      if (orders.length === 0) {
        list.innerHTML = '<p style="text-align: center; color: #666;">暂无订单</p>';
        return;
      }
      
      const statusMap = {
        'pending': '⏳ 待支付',
        'paid': '✅ 已支付',
        'shipped': '🚚 已发货',
        'delivered': '📦 已送达'
      };
      
      list.innerHTML = orders.map(o => `
        <div class="order-card">
          <div class="order-header">
            <span class="order-id">订单号：${o.id}</span>
            <span class="status ${o.status}">${statusMap[o.status]}</span>
          </div>
          <div class="order-info">
            <p><strong>商品金额：</strong>¥${o.amount || '0'}</p>
            <p><strong>收货人：</strong>${o.customer_name}</p>
            <p><strong>收货地址：</strong>${o.customer_address}</p>
            <p><strong>下单时间：</strong>${new Date(o.created_at).toLocaleString('zh-CN')}</p>
          </div>
          ${o.status === 'shipped' || o.status === 'delivered' ? `
            <div class="shipping-info">
              <h4>🚚 物流信息</h4>
              <p><strong>快递公司：</strong>${o.shipping_company}</p>
              <p><strong>快递单号：</strong>${o.tracking_number}</p>
              ${o.shipped_at ? `<p><strong>发货时间：</strong>${new Date(o.shipped_at).toLocaleString('zh-CN')}</p>` : ''}
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    function logout() {
      userPhone = '';
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('ordersSection').classList.remove('active');
      document.getElementById('phone').value = '';
      document.getElementById('errorMsg').style.display = 'none';
    }
  </script>
</body>
</html>
